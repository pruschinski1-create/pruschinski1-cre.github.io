<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lavë — Sistema de Gestão</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ══ RESET & VARS ══════════════════════════════════════════ */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --verde:#4B5A3A;
  --verde-d:#2a3020;
  --verde-l:#6b7f55;
  --areia:#C6B89A;
  --areia-l:#f0ece3;
  --offwhite:#FAF8F3;
  --branco:#fff;
  --cinza:#6a6a5a;
  --cinza-l:#e8e5de;
  --erro:#c0392b;
  --sucesso:#27ae60;
  --alerta:#e67e22;
  --sombra:0 4px 24px rgba(42,48,32,.10);
  --sombra-lg:0 8px 40px rgba(42,48,32,.16);
  --radius:10px;
  --trans:.22s ease;
}
html{scroll-behavior:smooth;}
body{font-family:'Montserrat',sans-serif;background:var(--offwhite);color:var(--verde-d);font-size:14px;min-height:100vh;}

/* ══ TELA DE LOGIN ════════════════════════════════════════ */
#login-screen{
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;
  background:linear-gradient(135deg,var(--verde-d) 0%,var(--verde) 60%,var(--verde-l) 100%);
  position:relative;overflow:hidden;
}
#login-screen::before{
  content:'LAVË';position:absolute;font-family:'Cinzel',serif;
  font-size:28vw;font-weight:600;color:rgba(255,255,255,.03);
  top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;
  white-space:nowrap;
}
.login-box{
  background:var(--offwhite);border-radius:16px;padding:48px 44px;
  width:100%;max-width:400px;box-shadow:var(--sombra-lg);
  position:relative;z-index:2;
}
.login-logo{font-family:'Cinzel',serif;font-size:2.4rem;color:var(--verde);letter-spacing:.08em;text-align:center;margin-bottom:4px;}
.login-sub{font-size:.65rem;letter-spacing:.3em;color:var(--areia);text-align:center;text-transform:uppercase;margin-bottom:32px;}
.login-tabs{display:flex;gap:4px;margin-bottom:28px;background:var(--cinza-l);border-radius:8px;padding:4px;}
.login-tab{flex:1;padding:8px;border:none;border-radius:6px;cursor:pointer;font-family:'Montserrat',sans-serif;font-size:.78rem;font-weight:500;color:var(--cinza);background:transparent;transition:var(--trans);}
.login-tab.active{background:var(--verde);color:#fff;}
.form-group{margin-bottom:16px;}
.form-group label{display:block;font-size:.7rem;font-weight:500;color:var(--cinza);letter-spacing:.12em;text-transform:uppercase;margin-bottom:6px;}
.form-group input{
  width:100%;padding:11px 14px;border:1.5px solid var(--cinza-l);
  border-radius:8px;font-family:'Montserrat',sans-serif;font-size:.9rem;
  color:var(--verde-d);background:#fff;outline:none;transition:var(--trans);
}
.form-group input:focus{border-color:var(--verde);}
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:11px 22px;border:none;border-radius:8px;cursor:pointer;
  font-family:'Montserrat',sans-serif;font-size:.82rem;font-weight:600;
  letter-spacing:.06em;transition:var(--trans);text-decoration:none;
}
.btn-primary{background:var(--verde);color:#fff;}
.btn-primary:hover{background:var(--verde-d);transform:translateY(-1px);}
.btn-secondary{background:var(--areia-l);color:var(--verde);}
.btn-secondary:hover{background:var(--cinza-l);}
.btn-danger{background:#fdf0ef;color:var(--erro);}
.btn-danger:hover{background:#fde0de;}
.btn-success{background:#edfaf3;color:var(--sucesso);}
.btn-full{width:100%;}
.btn-sm{padding:7px 14px;font-size:.75rem;}
.hint{font-size:.72rem;color:var(--cinza);text-align:center;margin-top:12px;}

/* ══ APP SHELL ════════════════════════════════════════════ */
#app{display:none;min-height:100vh;flex-direction:column;}
#app.visible{display:flex;}

/* ── Topbar ── */
.topbar{
  background:var(--verde);color:#fff;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;height:60px;position:sticky;top:0;z-index:100;
  box-shadow:0 2px 12px rgba(42,48,32,.2);
}
.topbar-logo{font-family:'Cinzel',serif;font-size:1.3rem;letter-spacing:.1em;color:var(--areia);}
.topbar-user{display:flex;align-items:center;gap:12px;}
.topbar-name{font-size:.78rem;color:rgba(255,255,255,.7);}
.topbar-role{font-size:.62rem;color:var(--areia);letter-spacing:.15em;text-transform:uppercase;}
.topbar-logout{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:.75rem;font-family:'Montserrat',sans-serif;transition:var(--trans);}
.topbar-logout:hover{background:rgba(255,255,255,.2);}

/* ── Layout ── */
.main-layout{display:flex;flex:1;}
.sidebar{
  width:220px;background:#fff;border-right:1px solid var(--cinza-l);
  padding:20px 0;display:flex;flex-direction:column;gap:4px;
  min-height:calc(100vh - 60px);
}
.nav-item{
  display:flex;align-items:center;gap:12px;
  padding:11px 20px;cursor:pointer;font-size:.82rem;font-weight:500;
  color:var(--cinza);border-left:3px solid transparent;transition:var(--trans);
  border-radius:0;
}
.nav-item:hover{background:var(--areia-l);color:var(--verde);}
.nav-item.active{background:var(--areia-l);color:var(--verde);border-left-color:var(--verde);font-weight:600;}
.nav-icon{font-size:1.1rem;width:22px;text-align:center;}
.nav-section{font-size:.6rem;letter-spacing:.25em;text-transform:uppercase;color:var(--areia);padding:16px 20px 6px;font-weight:600;}
.content{flex:1;padding:28px;overflow-y:auto;}

/* ══ CARDS & PAINEIS ════════════════════════════════════ */
.card{background:#fff;border-radius:var(--radius);padding:24px;box-shadow:var(--sombra);margin-bottom:20px;}
.card-title{font-family:'Cinzel',serif;font-size:1rem;color:var(--verde);margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--cinza-l);}
.page-title{font-family:'Cinzel',serif;font-size:1.5rem;color:var(--verde);margin-bottom:6px;}
.page-sub{font-size:.82rem;color:var(--cinza);margin-bottom:24px;}

/* Métricas dashboard */
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:16px;margin-bottom:24px;}
.metric{
  background:#fff;border-radius:var(--radius);padding:20px;
  box-shadow:var(--sombra);border-left:4px solid var(--verde);
}
.metric-num{font-family:'Cinzel',serif;font-size:2rem;color:var(--verde);line-height:1;}
.metric-label{font-size:.72rem;color:var(--cinza);margin-top:4px;letter-spacing:.08em;}
.metric.areia{border-left-color:var(--areia);}
.metric.areia .metric-num{color:var(--areia);}
.metric.sucesso{border-left-color:var(--sucesso);}
.metric.sucesso .metric-num{color:var(--sucesso);}
.metric.alerta{border-left-color:var(--alerta);}
.metric.alerta .metric-num{color:var(--alerta);}

/* Tabela */
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:.82rem;}
th{text-align:left;padding:10px 14px;font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;color:var(--cinza);border-bottom:2px solid var(--cinza-l);font-weight:600;}
td{padding:12px 14px;border-bottom:1px solid var(--cinza-l);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--areia-l);}

/* Badges */
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:.68rem;font-weight:600;letter-spacing:.06em;}
.badge-verde{background:#eaf0e4;color:var(--verde);}
.badge-areia{background:#f5f0e8;color:#8a6e3a;}
.badge-erro{background:#fdf0ef;color:var(--erro);}
.badge-sucesso{background:#edfaf3;color:var(--sucesso);}
.badge-alerta{background:#fef5ec;color:var(--alerta);}
.badge-cinza{background:var(--cinza-l);color:var(--cinza);}

/* Form inline */
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:20px;}
.form-grid-full{grid-column:1/-1;}
select,textarea{
  width:100%;padding:11px 14px;border:1.5px solid var(--cinza-l);
  border-radius:8px;font-family:'Montserrat',sans-serif;font-size:.88rem;
  color:var(--verde-d);background:#fff;outline:none;transition:var(--trans);
  -webkit-appearance:none;
}
select:focus,textarea:focus{border-color:var(--verde);}
textarea{resize:vertical;min-height:90px;}

/* Modal */
.modal-overlay{
  display:none;position:fixed;inset:0;background:rgba(42,48,32,.5);
  z-index:200;align-items:center;justify-content:center;padding:20px;
}
.modal-overlay.open{display:flex;}
.modal{
  background:#fff;border-radius:14px;padding:32px;
  width:100%;max-width:560px;max-height:90vh;overflow-y:auto;
  box-shadow:var(--sombra-lg);
}
.modal-title{font-family:'Cinzel',serif;font-size:1.1rem;color:var(--verde);margin-bottom:20px;}
.modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--cinza-l);}

/* Toast */
.toast{
  position:fixed;bottom:24px;right:24px;z-index:999;
  background:var(--verde-d);color:#fff;padding:14px 22px;
  border-radius:10px;font-size:.85rem;font-weight:500;
  box-shadow:var(--sombra-lg);
  transform:translateY(80px);opacity:0;transition:.3s ease;
  max-width:320px;
}
.toast.show{transform:translateY(0);opacity:1;}
.toast.erro{background:var(--erro);}
.toast.sucesso{background:var(--sucesso);}

/* ── Status bar cliente ── */
.status-timeline{display:flex;flex-direction:column;gap:0;}
.timeline-item{display:flex;gap:16px;padding-bottom:20px;position:relative;}
.timeline-item:not(:last-child)::before{content:'';position:absolute;left:14px;top:28px;width:1px;height:calc(100% - 8px);background:var(--cinza-l);}
.timeline-dot{width:28px;height:28px;min-width:28px;border-radius:50%;background:var(--verde);display:flex;align-items:center;justify-content:center;font-size:.75rem;color:#fff;z-index:1;}
.timeline-dot.pending{background:var(--cinza-l);color:var(--cinza);}
.timeline-content{flex:1;}
.timeline-title{font-weight:600;font-size:.85rem;color:var(--verde-d);margin-bottom:2px;}
.timeline-date{font-size:.75rem;color:var(--cinza);}

/* Chamado de garantia */
.chamado-card{border:1.5px solid var(--cinza-l);border-radius:var(--radius);padding:16px;margin-bottom:12px;}
.chamado-card.aberto{border-color:var(--alerta);}
.chamado-card.resolvido{border-color:var(--sucesso);}

/* ══ RESPONSIVO ══════════════════════════════════════════ */
@media(max-width:768px){
  .sidebar{display:none;}
  .content{padding:16px;}
  .metrics{grid-template-columns:1fr 1fr;}
  .form-grid{grid-template-columns:1fr;}
  .topbar{padding:0 16px;}
}

/* Tabs internas */
.tabs{display:flex;gap:4px;background:var(--cinza-l);border-radius:8px;padding:4px;margin-bottom:20px;}
.tab{flex:1;padding:8px;border:none;border-radius:6px;cursor:pointer;font-family:'Montserrat',sans-serif;font-size:.78rem;font-weight:500;color:var(--cinza);background:transparent;transition:var(--trans);}
.tab.active{background:var(--verde);color:#fff;}

.empty{text-align:center;padding:40px;color:var(--cinza);}
.empty-icon{font-size:2.5rem;margin-bottom:12px;}

.search-bar{display:flex;gap:10px;margin-bottom:20px;}
.search-bar input{flex:1;padding:10px 14px;border:1.5px solid var(--cinza-l);border-radius:8px;font-family:'Montserrat',sans-serif;font-size:.88rem;outline:none;transition:var(--trans);}
.search-bar input:focus{border-color:var(--verde);}

.actions-row{display:flex;gap:10px;align-items:center;margin-bottom:20px;flex-wrap:wrap;}

/* Portal cliente */
.client-hero{
  background:linear-gradient(135deg,var(--verde-d),var(--verde));
  border-radius:var(--radius);padding:28px;color:#fff;margin-bottom:20px;
}
.client-hero-logo{font-family:'Cinzel',serif;font-size:1.6rem;color:var(--areia);letter-spacing:.1em;margin-bottom:4px;}
.client-hero-name{font-size:1.1rem;font-weight:300;margin-bottom:2px;}
.client-hero-sub{font-size:.75rem;opacity:.7;letter-spacing:.1em;}

.garantia-card{
  border-radius:var(--radius);padding:20px;
  background:linear-gradient(135deg,var(--verde),var(--verde-l));
  color:#fff;margin-bottom:16px;
}
.garantia-title{font-family:'Cinzel',serif;font-size:.95rem;color:var(--areia);margin-bottom:8px;}
.garantia-dias{font-size:2rem;font-family:'Cinzel',serif;color:#fff;}
.garantia-info{font-size:.78rem;opacity:.8;margin-top:4px;}
.garantia-progress{height:6px;background:rgba(255,255,255,.2);border-radius:3px;margin-top:12px;overflow:hidden;}
.garantia-bar{height:100%;background:var(--areia);border-radius:3px;transition:width .6s ease;}


/* Fotos chamado */
.foto-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;}
.foto-item{width:80px;height:80px;border-radius:8px;object-fit:cover;cursor:pointer;border:2px solid var(--cinza-l);transition:var(--trans);}
.foto-item:hover{border-color:var(--verde);transform:scale(1.05);}
.foto-upload{display:flex;flex-direction:column;align-items:center;justify-content:center;width:80px;height:80px;border-radius:8px;border:2px dashed var(--cinza-l);cursor:pointer;font-size:1.4rem;color:var(--cinza);transition:var(--trans);}
.foto-upload:hover{border-color:var(--verde);color:var(--verde);}
/* Badge notificação na sidebar */
.nav-badge{background:var(--erro);color:#fff;border-radius:10px;font-size:.62rem;font-weight:700;padding:1px 6px;margin-left:auto;}
/* Notif banner */
.notif-banner{position:fixed;top:68px;right:20px;z-index:300;background:#fff;border-left:4px solid var(--alerta);border-radius:10px;padding:14px 18px;box-shadow:var(--sombra-lg);max-width:320px;transform:translateX(360px);transition:.4s ease;cursor:pointer;}
.notif-banner.show{transform:translateX(0);}
.notif-banner-title{font-weight:600;font-size:.88rem;color:var(--verde-d);margin-bottom:2px;}
.notif-banner-sub{font-size:.78rem;color:var(--cinza);}
/* Histórico chamados por cliente */
.hist-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--cinza-l);font-size:.82rem;}

/* Orcamento print view */
.orcamento-view{background:#fff;padding:40px;border-radius:var(--radius);}
.orcamento-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:32px;padding-bottom:20px;border-bottom:2px solid var(--cinza-l);}
.orcamento-logo-print{font-family:'Cinzel',serif;font-size:2rem;color:var(--verde);}
.orcamento-items table{width:100%;}
.orcamento-total{text-align:right;padding-top:16px;border-top:2px solid var(--cinza-l);margin-top:12px;}
.orcamento-total-num{font-family:'Cinzel',serif;font-size:1.6rem;color:var(--verde);}
</style>
</head>
<body>

<!-- ══ LOGIN ══════════════════════════════════════════════ -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">LAVË</div>
    <div class="login-sub">Preservação de Interiores</div>
    <div class="login-tabs">
      <button class="login-tab active" onclick="setLoginTab('admin')">Administrador</button>
      <button class="login-tab" onclick="setLoginTab('cliente')">Área do Cliente</button>
    </div>
    <div id="login-admin">
      <div class="form-group">
        <label>Usuário</label>
        <input type="text" id="admin-user" value="" placeholder="Usuário" autocomplete="username">
      </div>
      <div class="form-group">
        <label>Senha</label>
        <input type="password" id="admin-pass" value="" placeholder="Senha" autocomplete="current-password">
      </div>
      <button class="btn btn-primary btn-full" onclick="loginAdmin()">Entrar como Administrador</button>
      
    </div>
    <div id="login-cliente" style="display:none;">
      <div class="form-group">
        <label>CPF ou E-mail</label>
        <input type="text" id="client-id" placeholder="seu CPF ou e-mail">
      </div>
      <div class="form-group">
        <label>Código de acesso</label>
        <input type="text" id="client-code" placeholder="código recebido no serviço">
      </div>
      <button class="btn btn-primary btn-full" onclick="loginCliente()">Acessar Minha Área</button>
      <div class="hint">Use o código do certificado de serviço</div>
    </div>
  </div>
</div>

<!-- ══ APP ══════════════════════════════════════════════════ -->
<div id="app">

  <!-- Topbar -->
  <div class="topbar">
    <div class="topbar-logo">LAVË</div>
    <div class="topbar-user">
      <div>
        <div class="topbar-name" id="topbar-name">—</div>
        <div class="topbar-role" id="topbar-role">—</div>
      </div>
      <button class="topbar-logout" onclick="logout()">Sair</button>
    </div>
  </div>

  <div class="main-layout">
    <!-- Sidebar Admin -->
    <div class="sidebar" id="sidebar-admin" style="display:none;">
      <div class="nav-section">Principal</div>
      <div class="nav-item active" onclick="nav('dashboard')"><span class="nav-icon">📊</span> Dashboard</div>
      <div class="nav-item" onclick="nav('clientes')"><span class="nav-icon">👥</span> Clientes</div>
      <div class="nav-section">Comercial</div>
      <div class="nav-item" onclick="nav('orcamentos')"><span class="nav-icon">📄</span> Orçamentos</div>
      <div class="nav-item" onclick="nav('contratos')"><span class="nav-icon">📋</span> Contratos</div>
      <div class="nav-section">Pós-Venda</div>
      <div class="nav-item" onclick="nav('garantias')"><span class="nav-icon">🛡️</span> Garantias</div>
      <div class="nav-item" onclick="nav('chamados')"><span class="nav-icon">🔧</span> Chamados<span class="nav-badge" id="chamados-badge"></span></div>
      <div class="nav-section">Financeiro</div>
      <div class="nav-item" onclick="nav('financeiro')"><span class="nav-icon">💰</span> Financeiro</div>
    </div>

    <!-- Sidebar Cliente -->
    <div class="sidebar" id="sidebar-cliente" style="display:none;">
      <div class="nav-section">Minha Área</div>
      <div class="nav-item active" onclick="navCliente('meus-servicos')"><span class="nav-icon">🛋️</span> Meus Serviços</div>
      <div class="nav-item" onclick="navCliente('minha-garantia')"><span class="nav-icon">🛡️</span> Minha Garantia</div>
      <div class="nav-item" onclick="navCliente('meus-chamados')"><span class="nav-icon">🔧</span> Abrir Chamado</div>
    </div>

    <!-- Content -->
    <div class="content" id="content"></div>
  </div>
</div>

<!-- ══ MODAIS ════════════════════════════════════════════ -->
<div class="modal-overlay" id="modal-cliente"><div class="modal" id="modal-cliente-body"></div></div>
<div class="modal-overlay" id="modal-orcamento"><div class="modal" id="modal-orcamento-body"></div></div>
<div class="modal-overlay" id="modal-contrato"><div class="modal" id="modal-contrato-body"></div></div>
<div class="modal-overlay" id="modal-garantia"><div class="modal" id="modal-garantia-body"></div></div>
<div class="modal-overlay" id="modal-chamado"><div class="modal" id="modal-chamado-body"></div></div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Notificação de novo chamado -->
<div class="notif-banner" id="notif-banner" onclick="irParaChamados()">
  <div class="notif-banner-title">🔔 Novo chamado de garantia!</div>
  <div class="notif-banner-sub" id="notif-banner-sub">—</div>
</div>

<script>
// ══ ESTADO GLOBAL ════════════════════════════════════════
let APP = {
  role: null,   // 'admin' | 'cliente'
  clienteId: null,
  currentPage: null,
};

// ── BANCO DE DADOS: localStorage + Supabase sync ──
const SURL = 'https://bfddqwmnjjbvrtkldnfp.supabase.co/rest/v1';
const SKEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJmZGRxd21uampidnJ0a2xkbmZwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyMjIwNDIsImV4cCI6MjA5Mjc5ODA0Mn0.vXubzFZawNU4-BYfojURBDo9dqpwJr1DJDf3RBpWarI';
const SH   = { 'apikey':SKEY, 'Authorization':'Bearer '+SKEY, 'Content-Type':'application/json', 'Prefer':'return=representation' };

// ── Cache local (localStorage) ──
const DB = {
  get(k)      { try { return JSON.parse(localStorage.getItem('lave_'+k)||'[]'); } catch(e){ return []; } },
  set(k,v)    { localStorage.setItem('lave_'+k, JSON.stringify(v)); },
  id()        { return 'L'+Date.now().toString(36).toUpperCase()+Math.random().toString(36).slice(2,4).toUpperCase(); }
};

// ── Conversão snake ↔ camel ──
function toSnake(tbl, o) {
  const m = { orcamentos:{clienteId:'cliente_id'}, contratos:{clienteId:'cliente_id',valorMensal:'valor_mensal',visitasRealizadas:'visitas_realizadas',slaEmer:'sla_emer',slaNormal:'sla_normal',garantiaPrazo:'garantia_prazo',contratoAssinado:'contrato_assinado'}, garantias:{clienteId:'cliente_id',orcamentoId:'orcamento_id'}, chamados:{clienteId:'cliente_id',garantiaId:'garantia_id',fotosCliente:'fotos_cliente',fotosAdmin:'fotos_admin',dataResposta:'data_resposta',dataEncerramento:'data_encerramento'} }[tbl]||{};
  const r={};
  for(const[k,v] of Object.entries(o)){ r[m[k]||k]=v; }
  return r;
}

function fromSnake(tbl, o) {
  const m = { orcamentos:{cliente_id:'clienteId'}, contratos:{cliente_id:'clienteId',valor_mensal:'valorMensal',visitas_realizadas:'visitasRealizadas',sla_emer:'slaEmer',sla_normal:'slaNormal',garantia_prazo:'garantiaPrazo',contrato_assinado:'contratoAssinado'}, garantias:{cliente_id:'clienteId',orcamento_id:'orcamentoId'}, chamados:{cliente_id:'clienteId',garantia_id:'garantiaId',fotos_cliente:'fotosCliente',fotos_admin:'fotosAdmin',data_resposta:'dataResposta',data_encerramento:'dataEncerramento'} }[tbl]||{};
  const r={};
  for(const[k,v] of Object.entries(o)){ r[m[k]||k]=v; }
  if(tbl==='chamados'){ r.fotosCliente=r.fotosCliente||[]; r.fotosAdmin=r.fotosAdmin||[]; }
  return r;
}

// ── Sync com Supabase ──
async function syncToSupabase(tbl, item) {
  try {
    const snake = toSnake(tbl, item);
    // 1. Tentar PATCH (update) primeiro
    let r = await fetch(`${SURL}/${tbl}?id=eq.${item.id}`, {
      method: 'PATCH',
      headers: SH,
      body: JSON.stringify(snake)
    });
    // 2. Se não atualizou nenhuma linha, fazer INSERT
    if (r.ok) {
      const rows = await r.json();
      if (!rows || rows.length === 0) {
        r = await fetch(`${SURL}/${tbl}`, {
          method: 'POST',
          headers: SH,
          body: JSON.stringify(snake)
        });
        if (!r.ok) {
          const err = await r.text();
          console.error('Supabase INSERT error:', tbl, err);
        }
      }
    } else {
      // PATCH falhou, tentar INSERT direto
      r = await fetch(`${SURL}/${tbl}`, {
        method: 'POST',
        headers: SH,
        body: JSON.stringify(snake)
      });
      if (!r.ok) {
        const err = await r.text();
        console.error('Supabase INSERT error:', tbl, err);
      }
    }
  } catch(e) { console.warn('Supabase sync:', e.message); }
}

async function syncDeleteSupabase(tbl, id) {
  try {
    await fetch(`${SURL}/${tbl}?id=eq.${id}`, { method:'DELETE', headers:SH });
  } catch(e) { console.warn('Supabase delete (background):', e.message); }
}

async function syncFromSupabase(tbl) {
  try {
    const r = await fetch(`${SURL}/${tbl}?order=id.asc`, { headers:SH });
    if (!r.ok) return;
    const rows = await r.json();
    if (rows && rows.length > 0) {
      // Merge: Supabase + localStorage (localStorage tem prioridade)
      const local = DB.get(tbl);
      const remoteIds = rows.map(r=>r.id);
      const localOnly = local.filter(x => !remoteIds.includes(x.id));
      const merged = [...rows.map(row => fromSnake(tbl, row)), ...localOnly];
      DB.set(tbl, merged);
    }
  } catch(e) { console.warn('Supabase load:', tbl, e.message); }
}

// ── saveItem: salva LOCAL imediatamente + sync Supabase em background ──
async function saveItem(tbl, item) {
  // 1. Salvar no localStorage IMEDIATAMENTE
  const lista = DB.get(tbl);
  const idx = lista.findIndex(x => x.id === item.id);
  if (idx >= 0) { lista[idx] = item; } else { lista.push(item); }
  DB.set(tbl, lista);
  // 2. Sincronizar com Supabase (aguarda para garantir que cliente veja)
  await syncToSupabase(tbl, item);
}

// ── deleteItem: remove LOCAL imediatamente + sync Supabase ──
async function deleteItem(tbl, id) {
  const lista = DB.get(tbl).filter(x => x.id !== id);
  DB.set(tbl, lista);
  syncDeleteSupabase(tbl, id).catch(()=>{});
}

// ── loadAll: carrega do localStorage e tenta atualizar do Supabase ──
async function loadAll() {
  showLoading(true);
  // Tentar carregar do Supabase (pode falhar silenciosamente)
  await Promise.all(['clientes','orcamentos','contratos','garantias','chamados'].map(t => syncFromSupabase(t)));
  showLoading(false);
}

function showLoading(show) {
  let el = document.getElementById('global-loading');
  if (!el) {
    el = document.createElement('div');
    el.id = 'global-loading';
    el.style.cssText = 'position:fixed;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#4B5A3A,#C6B89A,#4B5A3A);background-size:200%;animation:loadbar 1.2s linear infinite;z-index:9999;display:none;';
    const s = document.createElement('style');
    s.textContent = '@keyframes loadbar{0%{background-position:200% 0}100%{background-position:-200% 0}}';
    document.head.appendChild(s);
    document.body.appendChild(el);
  }
  el.style.display = show ? 'block' : 'none';
}

// dbLoad = alias para compatibilidade
async function dbLoad(tbl) { await syncFromSupabase(tbl); }

function toast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  setTimeout(() => t.className = 'toast', 3000);
}

function fmtData(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleDateString('pt-BR');
}

function fmtMoeda(v) {
  return 'R$ ' + Number(v).toLocaleString('pt-BR', {minimumFractionDigits:2});
}

function diasRestantes(fimIso) {
  const diff = new Date(fimIso) - new Date();
  return Math.max(0, Math.ceil(diff / 864e5));
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

function openModal(id) {
  document.getElementById(id).classList.add('open');
}

function renderDashboard(filtroMes=null, filtroAno=null) {

  const contratos = DB.get('contratos');
  const garantias = DB.get('garantias');

  const ano = filtroAno !== null ? filtroAno : agora.getFullYear();

  if (!anos.includes(agora.getFullYear())) anos.unshift(agora.getFullYear());

  const orcMes = orc.filter(o => { const d=new Date(o.data); return d.getMonth()===mes&&d.getFullYear()===ano; });
  const fechados = orc.filter(o => o.status==='Fechado');
  const fechadosMes = orcMes.filter(o=>o.status==='Fechado');
  const orcAbertos = orc.filter(o => o.status==='Enviado');

      <div>
        <div class="page-title">Dashboard</div>

          ${meses.map((m,i)=>`<option value="${i}" ${i===mes?'selected':''}>${m}</option>`).join('')}
        </select>
        <select onchange="renderDashboard(${mes}, this.value)" style="padding:8px 12px;border:1.5px solid var(--cinza-l);border-radius:8px;font-family:Montserrat,sans-serif;font-size:.82rem;outline:none;">
          ${anos.map(a=>`<option value="${a}" ${a===ano?'selected':''}>${a}</option>`).join('')}
        </select>
      </div>
    </div>

    <div class="metrics">
      <div class="metric">
        <div class="metric-num">${orcMes.length}</div>
        <div class="metric-label">Orçamentos em ${meses[mes]}</div>
      </div>
      <div class="metric sucesso">
        <div class="metric-num">${fechadosMes.length}</div>
        <div class="metric-label">Fechados em ${meses[mes]}</div>
      </div>
      <div class="metric areia">
        <div class="metric-num">${orcAbertos.length}</div>
        <div class="metric-label">Aguardando resposta</div>
      </div>
      <div class="metric">
        <div class="metric-num">${clientes.length}</div>
        <div class="metric-label">Clientes cadastrados</div>
      </div>
      <div class="metric sucesso">
        <div class="metric-num">${garAtivas.length}</div>
        <div class="metric-label">Garantias ativas</div>
      </div>
      <div class="metric alerta">
        <div class="metric-num">${chamAbertos.length}</div>
        <div class="metric-label">Chamados abertos</div>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">
      <div class="card">
        <div class="card-title">Últimos Orçamentos</div>
        ${orc.slice(-4).reverse().map(o => {
          const cl = DB.get('clientes').find(c=>c.id===o.clienteId);
          return `<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--cinza-l);">
            <div>
              <div style="font-weight:600;font-size:.83rem;">${o.numero}</div>
              <div style="font-size:.75rem;color:var(--cinza);">${cl?cl.nome:'—'}</div>
            </div>
            <div style="display:flex;gap:8px;align-items:center;">
              <span style="font-weight:600;font-size:.85rem;">${fmtMoeda(o.total)}</span>
              ${badgeStatus(o.status)}
            </div>
          </div>`;
        }).join('')}
        <div style="margin-top:12px;"><button class="btn btn-secondary btn-sm" onclick="nav('orcamentos')">Ver todos →</button></div>
      </div>

      <div class="card">
        <div class="card-title">Chamados Abertos</div>
        ${chamAbertos.length === 0 ? '<div class="empty"><div class="empty-icon">✅</div>Nenhum chamado aberto</div>' :
          chamAbertos.map(ch => {
            const cl = DB.get('clientes').find(c=>c.id===ch.clienteId);
            return `<div style="padding:10px 0;border-bottom:1px solid var(--cinza-l);">
              <div style="font-weight:600;font-size:.83rem;">${ch.numero} — ${ch.tipo}</div>

            <td>${fmtData(g.fim)}</td>

            <td>${badgeStatus(g.status)}</td>
          </tr>`;
        }).join('')}
        </tbody>
      </table>
      </div>
    </div>
  `;
}

function badgeStatus(s) {
  const map = { 'Fechado':'badge-sucesso','Enviado':'badge-alerta','Cancelado':'badge-erro','Ativo':'badge-verde','Ativa':'badge-verde','Expirada':'badge-cinza','Aberto':'badge-alerta','Resolvido':'badge-sucesso','Encerrado':'badge-cinza' };
  return `<span class="badge ${map[s]||'badge-cinza'}">${s}</span>`;
}

async function salvarCliente(id) {
  const dados = {
    nome: document.getElementById('c-nome').value,
    cpfcnpj: document.getElementById('c-cpfcnpj').value,
    contato: document.getElementById('c-contato').value,
    email: document.getElementById('c-email').value,
    tel: document.getElementById('c-tel').value,
    tipo: document.getElementById('c-tipo').value,
    endereco: document.getElementById('c-end').value,
    obs: document.getElementById('c-obs').value,
  };
  if (!dados.nome) { toast('Informe o nome do cliente.', 'erro'); return; }
  const clientes = DB.get('clientes');
  if (id) {
    const item = { ...clientes.find(c=>c.id===id), ...dados };
    await saveItem('clientes', item);
  } else {
    const novo = { id: DB.id(), codigo: 'LAVE' + String(clientes.length+1).padStart(3,'0'), criado: new Date().toISOString(), ...dados };
    await saveItem('clientes', novo);
  }
  await dbLoad('clientes');
  closeModal('modal-cliente');
  toast('Cliente salvo com sucesso!', 'sucesso');
  renderClientes();
}

// ══ ORÇAMENTOS ═══════════════════════════════════════════
async function renderOrcamentos(aba='todos') {
  if (!DB.get('orcamentos').length && !DB.get('clientes').length) {
    await loadAll();
  } else {
    if (!DB.get('orcamentos').length) await dbLoad('orcamentos');
    if (!DB.get('clientes').length) await dbLoad('clientes');
  }
  const todos = DB.get('orcamentos');
  const filtros = { todos, enviados: todos.filter(o=>o.status==='Enviado'), fechados: todos.filter(o=>o.status==='Fechado'), cancelados: todos.filter(o=>o.status==='Cancelado') };
  const lista = filtros[aba];

function addItemOrcamento() {

  div.className = 'form-grid';

async function salvarOrcamento(num) {
  const clienteId = document.getElementById('o-cliente').value;
  const validade  = document.getElementById('o-validade').value;
  const obs       = document.getElementById('o-obs').value;
  if (!clienteId) { toast('Selecione um cliente.','erro'); return; }

  const descs = Array.from(document.querySelectorAll('.o-desc')).map(i=>i.value);
  const qtys  = Array.from(document.querySelectorAll('.o-qty')).map(i=>Number(i.value));
  const units = Array.from(document.querySelectorAll('.o-unit')).map(i=>Number(i.value));

  const itens = descs.map((d,i)=>({desc:d,qty:qtys[i],unit:units[i]})).filter(it=>it.desc);
  if (!itens.length) { toast('Adicione pelo menos um item.','erro'); return; }

  const total = itens.reduce((s,it)=>s+it.qty*it.unit,0);
  const novo = { id:DB.id(), clienteId, numero:num, data:new Date().toISOString(), status:'Enviado', validade, itens, obs, total };
  await saveItem('orcamentos', novo);
  closeModal('modal-orcamento');
  toast('Orçamento criado com sucesso!','sucesso');
  renderOrcamentos();
}

async function salvarEdicaoOrcamento(id) {
  const orc = DB.get('orcamentos');
  const i = orc.findIndex(x=>x.id===id);
  const descs = Array.from(document.querySelectorAll('.o-desc')).map(x=>x.value);
  const qtys  = Array.from(document.querySelectorAll('.o-qty')).map(x=>Number(x.value));
  const units = Array.from(document.querySelectorAll('.o-unit')).map(x=>Number(x.value));
  const itens = descs.map((d,j)=>({desc:d,qty:qtys[j],unit:units[j]})).filter(it=>it.desc);
  if (!itens.length) { toast('Adicione pelo menos um item.','erro'); return; }
  orc[i].clienteId = document.getElementById('o-cliente').value;
  orc[i].validade  = document.getElementById('o-validade').value;
  orc[i].obs       = document.getElementById('o-obs').value;
  orc[i].itens     = itens;
  orc[i].total     = itens.reduce((s,it)=>s+it.qty*it.unit,0);
  await saveItem('orcamentos', orc[i]);
  closeModal('modal-orcamento');
  toast('Orçamento atualizado!','sucesso');
  renderOrcamentos();
}

async function renderContratos(aba='ativos') {
  if (!DB.get('contratos').length) await dbLoad('contratos');
  if (!DB.get('clientes').length) await dbLoad('clientes');
  const todos = DB.get('contratos');
  // Auto-atualizar status por data
  const hoje = new Date();
  todos.forEach(ct => {
    if (ct.fim && new Date(ct.fim) < hoje && ct.status==='Ativo') ct.status='Encerrado';
  });
  // status auto-update happens via saveItem

  const ativos     = todos.filter(ct=>ct.status==='Ativo');
  const inativos   = todos.filter(ct=>ct.status==='Encerrado'||ct.status==='Cancelado');
  const aguardando = todos.filter(ct=>ct.status==='Aguardando');
  const vencendo   = ativos.filter(ct=>ct.fim && diasRestantes(ct.fim)<=30);
  const lista = aba==='ativos'?ativos:aba==='inativos'?inativos:aba==='aguardando'?aguardando:todos;

  document.getElementById('content').innerHTML = `
    <div class="page-title">Contratos</div>
    <div class="page-sub">${todos.length} contratos · ${ativos.length} ativos · ${vencendo.length} vencendo em 30 dias</div>

    ${vencendo.length?`<div style="background:#fef5ec;border-left:4px solid var(--alerta);border-radius:8px;padding:14px 18px;margin-bottom:20px;display:flex;align-items:center;gap:12px;">
      <span style="font-size:1.4rem;">⚠️</span>
      <div><div style="font-weight:600;color:var(--alerta);">${vencendo.length} contrato(s) vencendo nos próximos 30 dias</div>
      <div style="font-size:.82rem;color:var(--cinza);">${vencendo.map(ct=>{const cl=DB.get('clientes').find(c=>c.id===ct.clienteId); return `${ct.numero} (${cl?cl.nome:'—'}) — ${diasRestantes(ct.fim)} dias`;}).join(' · ')}</div></div>
    </div>`:''}

    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px;">
      <div class="tabs" style="max-width:500px;margin:0;">
        <button class="tab ${aba==='ativos'?'active':''}" onclick="renderContratos('ativos')">Ativos (${ativos.length})</button>
        <button class="tab ${aba==='aguardando'?'active':''}" onclick="renderContratos('aguardando')">Aguardando (${aguardando.length})</button>
        <button class="tab ${aba==='inativos'?'active':''}" onclick="renderContratos('inativos')">Inativos (${inativos.length})</button>
        <button class="tab ${aba==='todos'?'active':''}" onclick="renderContratos('todos')">Todos (${todos.length})</button>
      </div>
      <button class="btn btn-primary" onclick="novoContrato()">+ Novo Contrato</button>
    </div>

    <div class="card" style="padding:0;overflow:hidden;">
      <div class="table-wrap">
      <table>
        <thead><tr><th>Número</th><th>Cliente</th><th>Tipo</th><th>Vigência</th><th>Valor</th><th>Dias rest.</th><th>Status</th><th>Ações</th></tr></thead>
        <tbody>
        ${lista.length===0?`<tr><td colspan="8"><div class="empty"><div class="empty-icon">📋</div>Nenhum contrato aqui</div></td></tr>`:
          lista.map(ct=>{
            const cl=DB.get('clientes').find(c=>c.id===ct.clienteId);
            const dias = ct.fim ? diasRestantes(ct.fim) : '—';
            const diasBadge = typeof dias==='number' ? (dias<=30?'badge-alerta':dias<=90?'badge-areia':'badge-sucesso') : 'badge-cinza';
            return `<tr>
              <td><strong>${ct.numero}</strong></td>
              <td style="max-width:160px;">${cl?cl.nome:'—'}</td>
              <td>${ct.tipo}</td>
              <td style="font-size:.78rem;">${fmtData(ct.inicio)} → ${fmtData(ct.fim)}</td>
              <td><strong>${fmtMoeda(ct.valor)}</strong></td>
              <td>${typeof dias==='number'?`<span class="badge ${diasBadge}">${dias}d</span>`:'—'}</td>
              <td>${badgeStatus(ct.status)}</td>
              <td style="display:flex;gap:6px;flex-wrap:wrap;">
                <button class="btn btn-sm btn-secondary" onclick="pdfContrato('${ct.id}')">📄 PDF</button>
                <button class="btn btn-sm btn-secondary" onclick="verContrato('${ct.id}')">Ver</button>
                <button class="btn btn-sm btn-danger" onclick="excluir('contratos','${ct.id}',renderContratos)">Excluir</button>
              </td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
      </div>
    </div>`;

function calcTotalContrato() {
  const mensal = Number(document.getElementById('ct-valor-mensal').value) || 0;
  document.getElementById('ct-valor').value = mensal * 12;
}

async function salvarContrato(num) {
  const clienteId = document.getElementById('ct-cliente').value;
  if (!clienteId) { toast('Selecione um cliente.','erro'); return; }
  const contratos = DB.get('contratos');
  const id = DB.id();
  const G = id => { try { return document.getElementById(id)?document.getElementById(id).value:''; } catch(e){return '';} };
  const novo = {
    id, clienteId, numero:num,
    tipo:         G('ct-tipo'),
    status:       G('ct-status'),
    inicio:       G('ct-inicio'),
    fim:          G('ct-fim'),
    valorMensal:  Number(G('ct-valor-mensal')),
    valor:        Number(G('ct-valor')),
    visitas:      Number(G('ct-visitas')||4),
    higienizacoes:Number(G('ct-higienizacoes')||2),
    visitasRealizadas: 0,
    cnpj:         G('ct-cnpj'),
    sindico:      G('ct-sindico'),
    cidade:       G('ct-cidade'),
    slaEmer:      G('ct-sla-emer'),
    slaNormal:    G('ct-sla-normal'),
    garantiaPrazo:G('ct-garantia-prazo'),
    multa:        G('ct-multa'),
    pgto:         G('ct-pgto'),
    venc:         G('ct-venc'),
    reajuste:     G('ct-reajuste'),
    descricao:    G('ct-desc'),
    obs:          G('ct-obs'),
    contratoAssinado: null,
  };
  await saveItem('contratos', novo);
  await dbLoad('contratos');
  closeModal('modal-contrato');
  toast('Contrato salvo! Gerando PDF...','sucesso');
  setTimeout(()=>pdfContrato(id), 400);
  renderContratos();
}

  document.getElementById('modal-contrato-body').innerHTML = `

      }

    </div>`;

function uploadContratoAssinado(ctId, input) {
  const file = input.files[0];
  if (!file) return;
  if (file.size > 5 * 1024 * 1024) { toast('Arquivo muito grande. Máximo 5MB.','erro'); return; }
  const reader = new FileReader();
  reader.onload = async e => {
    const contratos = DB.get('contratos');
    const i = contratos.findIndex(x=>x.id===ctId);
    const item = { ...contratos[i], contratoAssinado:{ nome:file.name, data:e.target.result, tipo:file.type }, status:'Ativo' };
    await saveItem('contratos', item);
    toast('Contrato assinado anexado! Contrato ativado.','sucesso');
    verContrato(ctId);
  };
  reader.readAsDataURL(file);
}

function verContratoAssinado(ctId) {
  const ct = DB.get('contratos').find(x=>x.id===ctId);
  if (!ct.contratoAssinado) return;
  const w = window.open('','_blank');
  if (ct.contratoAssinado.tipo === 'application/pdf') {
    w.document.write(`<iframe src="${ct.contratoAssinado.data}" style="width:100%;height:100vh;border:none;"></iframe>`);
  } else {
    w.document.write(`<img src="${ct.contratoAssinado.data}" style="max-width:100%;">`);
  }
  w.document.close();
}

async function removerAssinado(ctId) {
  if (!confirm('Remover o contrato assinado anexado?')) return;
  const contratos = DB.get('contratos');
  const i = contratos.findIndex(x=>x.id===ctId);
  const item = { ...contratos[i], contratoAssinado:null };
  await saveItem('contratos', item);
  toast('Contrato assinado removido.','');
  verContrato(ctId);
}

async function renderGarantias() {
  if (!DB.get('garantias').length) await dbLoad('garantias');

  const todos = DB.get('garantias');
  document.getElementById('content').innerHTML = `
    <div class="page-title">Garantias</div>
    <div class="page-sub">${todos.length} garantias cadastradas</div>
    <div class="actions-row">
      <button class="btn btn-primary" onclick="novaGarantia()">+ Nova Garantia</button>
    </div>
    <div class="card" style="padding:0;overflow:hidden;">
      <div class="table-wrap">
      <table>
        <thead><tr><th>Número</th><th>Cliente</th><th>Itens cobertos</th><th>Início</th><th>Vencimento</th><th>Dias restantes</th><th>Status</th><th>Ação</th></tr></thead>
        <tbody>
        ${todos.length===0?`<tr><td colspan="7"><div class="empty"><div class="empty-icon">🛡️</div>Nenhuma garantia</div></td></tr>`:
          todos.map(g=>{
            const cl=DB.get('clientes').find(c=>c.id===g.clienteId);
            const dias=diasRestantes(g.fim);
            const badge=dias<30?'badge-alerta':'badge-sucesso';
            return `<tr>

              <td>${cl?cl.nome:'—'}</td>
              <td style="max-width:180px;font-size:.78rem;">${g.itens}</td>
              <td>${fmtData(g.inicio)}</td>

              <td><span class="badge ${badge}">${dias} dias</span></td>
              <td>${badgeStatus(g.status)}</td>
            <td style="display:flex;gap:6px;">
                <button class="btn btn-sm btn-secondary" onclick="pdfGarantia('${g.id}')">📄 PDF</button>

async function novaGarantia() {
  if (!DB.get('clientes').length) await dbLoad('clientes');
  const clientes = DB.get('clientes');
  const garantias = DB.get('garantias');
  const num = 'GAR-' + String(garantias.length+1).padStart(3,'0');
  document.getElementById('modal-garantia-body').innerHTML = `
    <div class="modal-title">Nova Garantia — ${num}</div>
    <div class="form-grid">
      <div class="form-group"><label>Cliente</label>
        <select id="g-cliente"><option value="">Selecione...</option>${clientes.map(c=>`<option value="${c.id}">${c.nome}</option>`).join('')}</select>
      </div>
      <div class="form-group"><label>Data de Início</label><input type="date" id="g-inicio"></div>
      <div class="form-group"><label>Data de Vencimento</label><input type="date" id="g-fim"></div>
      <div class="form-group form-grid-full"><label>Itens cobertos</label><input id="g-itens" placeholder="Ex: 40 cadeiras + 3 sofás (blindagem)"></div>
      <div class="form-group form-grid-full"><label>Observações</label><textarea id="g-obs"></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('modal-garantia')">Cancelar</button>
      <button class="btn btn-primary" onclick="salvarGarantia('${num}')">Emitir Garantia</button>
    </div>`;
  openModal('modal-garantia');
}

async function salvarGarantia(num) {
  const clienteId = document.getElementById('g-cliente').value;
  if (!clienteId) { toast('Selecione um cliente.','erro'); return; }
  const garantias = DB.get('garantias');
  const nova = {
    id:DB.id(), clienteId, numero:num,
    inicio: document.getElementById('g-inicio').value,
    fim: document.getElementById('g-fim').value,
    itens: document.getElementById('g-itens').value,
    obs: document.getElementById('g-obs').value,
    status:'Ativa', criado: new Date().toISOString()
  };
  await saveItem('garantias', nova);
  await dbLoad('garantias');
  closeModal('modal-garantia');
  toast('Garantia emitida!','sucesso');
  renderGarantias();
}

async function renderChamados(aba='todos') {
  if (!DB.get('chamados').length) await dbLoad('chamados');
  if (!DB.get('clientes').length) await dbLoad('clientes');
  const todos = DB.get('chamados');
  const abertos    = todos.filter(c=>c.status==='Aberto');
  const resolvidos = todos.filter(c=>c.status==='Resolvido');
  const encerrados = todos.filter(c=>c.status==='Encerrado');
  const lista = aba==='abertos'?abertos : aba==='resolvidos'?resolvidos : aba==='encerrados'?encerrados : todos;

  // Atualiza badge na sidebar
  const badge = document.getElementById('chamados-badge');
  if (badge) badge.textContent = abertos.length || '';

// ── Notificação de novo chamado ──
function notificarAdmin(num, tipo) {
  // Notificação visual no app
  const banner = document.getElementById('notif-banner');
  const sub    = document.getElementById('notif-banner-sub');
  if (sub) sub.textContent = num + ' — ' + tipo;
  if (banner) { banner.classList.add('show'); setTimeout(()=>banner.classList.remove('show'), 6000); }

  // Notificação do navegador (se permitido)
  if ('Notification' in window && Notification.permission === 'granted') {
    new Notification('Lavë — Novo Chamado!', { body: num + ': ' + tipo, icon: '' });
  } else if ('Notification' in window && Notification.permission !== 'denied') {
    Notification.requestPermission().then(p => {
      if (p === 'granted') new Notification('Lavë — Novo Chamado!', { body: num + ': ' + tipo });
    });
  }

  // Som de notificação
  try {
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.setValueAtTime(880, ctx.currentTime);
    osc.frequency.setValueAtTime(660, ctx.currentTime+0.1);
    gain.gain.setValueAtTime(0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.4);
    osc.start(); osc.stop(ctx.currentTime+0.4);
  } catch(e){}
}

function closeNotif() {
  const b = document.getElementById('notif-banner');
  if(b) b.classList.remove('show');
}

// Solicitar permissão de notificação ao logar como admin
function pedirPermissaoNotificacao() {
  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
  }
}

// Fechar modal clicando fora
document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', function(e) {
    if (e.target === this) this.classList.remove('open');
  });
});


// ══ FINANCEIRO ═══════════════════════════════════════════
function renderFinanceiro(filtroAno=null) {
  const orc = DB.get('orcamentos');
  const agora = new Date();
  const ano = filtroAno || agora.getFullYear();
  const anos = [...new Set(orc.map(o=>new Date(o.data).getFullYear()))].sort((a,b)=>b-a);
  if (!anos.includes(agora.getFullYear())) anos.unshift(agora.getFullYear());

  const meses = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  const fechadosAno = orc.filter(o => o.status==='Fechado' && new Date(o.data).getFullYear()===Number(ano));

  // Financeiro acumulado (todos os anos até o selecionado)
  const DESPESA_PCT = 0.30;
  const LUCRO_PCT   = 0.50;
  const CAIXA_PCT   = 0.20;

  // Dados por mês
  const dadosMes = Array.from({length:12}, (_,m) => {
    const orcMes = fechadosAno.filter(o => new Date(o.data).getMonth()===m);
    const receita = orcMes.reduce((s,o)=>s+Number(o.total),0);
    return { mes:m, receita, despesa:receita*DESPESA_PCT, lucro:receita*LUCRO_PCT, caixa:receita*CAIXA_PCT, qtd:orcMes.length };
  });

  const totalReceita  = dadosMes.reduce((s,d)=>s+d.receita,0);
  const totalDespesa  = totalReceita * DESPESA_PCT;
  const totalLucro    = totalReceita * LUCRO_PCT;
  const totalCaixaAno = totalReceita * CAIXA_PCT;

  // Saldo de caixa acumulado (todos os fechados de todos os anos até o selecionado)
  const todosFechados = orc.filter(o => o.status==='Fechado' && new Date(o.data).getFullYear()<=Number(ano));
  const caixaAcumulado = todosFechados.reduce((s,o)=>s+Number(o.total)*CAIXA_PCT, 0);

  // Gráfico de barras simples por mês
  const maxVal = Math.max(...dadosMes.map(d=>d.receita), 1);

  document.getElementById('content').innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px;margin-bottom:20px;">
      <div>
        <div class="page-title">Financeiro</div>
        <div class="page-sub">Ano: ${ano}</div>
      </div>
      <select onchange="renderFinanceiro(this.value)" style="padding:8px 12px;border:1.5px solid var(--cinza-l);border-radius:8px;font-family:Montserrat,sans-serif;font-size:.85rem;outline:none;">
        ${anos.map(a=>`<option value="${a}" ${a===Number(ano)?'selected':''}>${a}</option>`).join('')}
      </select>
    </div>

    <!-- Cards principais -->
    <div class="metrics" style="grid-template-columns:repeat(auto-fit,minmax(160px,1fr));">
      <div class="metric sucesso">
        <div class="metric-num" style="font-size:1.5rem;">${fmtMoeda(totalReceita)}</div>
        <div class="metric-label">Receita Total ${ano}</div>
      </div>
      <div class="metric alerta">
        <div class="metric-num" style="font-size:1.5rem;">${fmtMoeda(totalDespesa)}</div>
        <div class="metric-label">Despesas (30%)</div>
      </div>
      <div class="metric">
        <div class="metric-num" style="font-size:1.5rem;">${fmtMoeda(totalLucro)}</div>
        <div class="metric-label">Lucro Líquido (50%)</div>
      </div>
      <div class="metric" style="border-left-color:#8e44ad;">
        <div class="metric-num" style="font-size:1.5rem;color:#8e44ad;">${fmtMoeda(caixaAcumulado)}</div>
        <div class="metric-label">Saldo de Caixa Acumulado</div>
      </div>
    </div>

    <!-- Explicação das divisões -->
    <div class="card" style="margin-bottom:20px;">
      <div class="card-title">Como é dividida cada receita fechada</div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;">
        <div style="padding:14px;border-radius:8px;background:#fef5ec;border-left:4px solid var(--alerta);text-align:center;">
          <div style="font-family:'Cinzel',serif;font-size:1.4rem;color:var(--alerta);">30%</div>
          <div style="font-weight:600;font-size:.82rem;margin:4px 0;">Despesas Operacionais</div>
          <div style="font-size:.75rem;color:var(--cinza);">Produtos, equipamentos, deslocamento e custos fixos</div>
        </div>
        <div style="padding:14px;border-radius:8px;background:#edfaf3;border-left:4px solid var(--sucesso);text-align:center;">
          <div style="font-family:'Cinzel',serif;font-size:1.4rem;color:var(--sucesso);">50%</div>
          <div style="font-weight:600;font-size:.82rem;margin:4px 0;">Lucro Líquido</div>
          <div style="font-size:.75rem;color:var(--cinza);">Retorno da operação após despesas</div>
        </div>
        <div style="padding:14px;border-radius:8px;background:#f5eeff;border-left:4px solid #8e44ad;text-align:center;">
          <div style="font-family:'Cinzel',serif;font-size:1.4rem;color:#8e44ad;">20%</div>
          <div style="font-weight:600;font-size:.82rem;margin:4px 0;">Reserva de Caixa</div>
          <div style="font-size:.75rem;color:var(--cinza);">Acumula mês a mês para capital de giro</div>
        </div>
      </div>
    </div>

    <!-- Tabela mensal -->
    <div class="card" style="padding:0;overflow:hidden;">
      <div style="padding:16px 20px 0;font-family:'Cinzel',serif;font-size:.95rem;color:var(--verde);">Resultado Mensal — ${ano}</div>
      <div class="table-wrap" style="padding:8px 0;">
        <table>
          <thead><tr>
            <th>Mês</th>
            <th>Orç. Fechados</th>
            <th style="text-align:right;">Receita</th>
            <th style="text-align:right;">Despesas (30%)</th>
            <th style="text-align:right;">Lucro (50%)</th>
            <th style="text-align:right;">Caixa (20%)</th>
            <th>Gráfico</th>
          </tr></thead>
          <tbody>
          ${dadosMes.map(d=>`<tr ${d.receita>0?'style="font-weight:500;"':''}>
            <td>${meses[d.mes]}</td>
            <td><span class="badge ${d.qtd>0?'badge-verde':'badge-cinza'}">${d.qtd}</span></td>
            <td style="text-align:right;color:var(--sucesso);font-weight:600;">${d.receita>0?fmtMoeda(d.receita):'—'}</td>
            <td style="text-align:right;color:var(--alerta);">${d.receita>0?fmtMoeda(d.despesa):'—'}</td>
            <td style="text-align:right;color:var(--verde);">${d.receita>0?fmtMoeda(d.lucro):'—'}</td>
            <td style="text-align:right;color:#8e44ad;">${d.receita>0?fmtMoeda(d.caixa):'—'}</td>
            <td style="min-width:80px;">
              <div style="background:var(--cinza-l);border-radius:3px;height:8px;overflow:hidden;">
                <div style="background:var(--verde);height:100%;width:${d.receita>0?Math.round(d.receita/maxVal*100):0}%;border-radius:3px;"></div>
              </div>
            </td>
          </tr>`).join('')}
          <tr style="border-top:2px solid var(--verde);font-weight:700;background:var(--areia-l);">
            <td><strong>TOTAL ${ano}</strong></td>
            <td><span class="badge badge-verde">${fechadosAno.length}</span></td>
            <td style="text-align:right;color:var(--sucesso);">${fmtMoeda(totalReceita)}</td>
            <td style="text-align:right;color:var(--alerta);">${fmtMoeda(totalDespesa)}</td>
            <td style="text-align:right;color:var(--verde);">${fmtMoeda(totalLucro)}</td>
            <td style="text-align:right;color:#8e44ad;">${fmtMoeda(totalCaixaAno)}</td>
            <td></td>
          </tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Saldo acumulado de caixa -->
    <div class="card">
      <div class="card-title">Saldo de Caixa Acumulado (histórico completo)</div>
      <div style="display:flex;align-items:center;gap:20px;flex-wrap:wrap;">
        <div style="font-family:'Cinzel',serif;font-size:2.2rem;color:#8e44ad;">${fmtMoeda(caixaAcumulado)}</div>
        <div style="font-size:.85rem;color:var(--cinza);max-width:340px;">Este valor representa o saldo de caixa acumulado de todos os orçamentos fechados até ${ano}. O caixa cresce mês a mês com 21% de cada receita.</div>
      </div>
    </div>
  `;
}
